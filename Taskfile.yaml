version: "3"

vars:
  LDFLAGS: "-s -w"

tasks:
  default:
    desc: List all tasks
    cmds:
      - task --list-all
    silent: true

  deps:
    desc: Install required development tools
    cmds:
      - go install honnef.co/go/tools/cmd/staticcheck@latest
      - go install mvdan.cc/gofumpt@latest
      - go install golang.org/x/tools/cmd/goimports@latest
      - go install github.com/go-task/task/v3/cmd/task@latest

  lint:
    desc: Run all linters (staticcheck, gofmt, gofumpt, goimports, go vet)
    cmds:
      - staticcheck ./...
      - cmd: |
          UNFORMATTED=$(gofmt -l .)
          if [ -n "$UNFORMATTED" ]; then
            echo "unformatted files (run: gofmt -w .):"
            echo "$UNFORMATTED"
            exit 1
          fi
      - cmd: |
          UNFORMATTED=$(gofumpt -l .)
          if [ -n "$UNFORMATTED" ]; then
            echo "unformatted files (run: gofumpt -w .):"
            echo "$UNFORMATTED"
            exit 1
          fi
      - cmd: |
          UNFORMATTED=$(goimports -l .)
          if [ -n "$UNFORMATTED" ]; then
            echo "unformatted files (run: goimports -w .):"
            echo "$UNFORMATTED"
            exit 1
          fi
      - go vet ./...

  test:
    desc: Run tests with race detector and coverage
    cmds:
      - GORACE=atexit_sleep_ms=0 go test -v -trimpath -failfast -race -cover
        -coverprofile=coverage.txt ./...

  test:integration:
    desc: Run cross-package integration tests
    cmds:
      - go test -v -trimpath ./tests/integration

  test:e2e:
    desc: Run docker-based multi-node e2e tests
    cmds:
      - bash ./scripts/with-e2e-lock.sh env NETLOOM_E2E=1 go test -v -trimpath ./tests/e2e

  env:doctor:
    desc: Rebuild and repair the docker-based e2e lab environment
    cmds:
      - bash ./scripts/with-e2e-lock.sh bash ./scripts/doctor-e2e-env.sh

  build:
    desc: Build all binaries to bin/
    cmds:
      - CGO_ENABLED=0 go build -trimpath -ldflags "{{.LDFLAGS}}" -o bin/ ./cmd/...

  release-snapshot:
    desc: Dry-run goreleaser release locally without pushing to GitHub or registries
    cmds:
      - goreleaser release --snapshot --clean
